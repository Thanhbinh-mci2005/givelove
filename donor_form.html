	<!-- Form nhập liệu với nền màu xanh dương nhạt -->
	<div class="form-section">
    	<form action="process_donation.php" method="POST">
        	<div class="form-group">
            	<label for="full_name">Họ và tên người ủng hộ:</label>
            	<input type="text" id="full_name" name="full_name" placeholder="Nhập họ và tên người ủng hộ" required>
						</div>
						<div class="form-group">
								<label for="phone_number">Số điện thoại:</label>
								<input type="text" id="phone_number" name="phone_number" placeholder="Nhập số điện thoại" required>
						</div>

	        <div class="form-group">
	            	<label for="email">email:</label>
	            	<input type="text" id="email" name="email" placeholder="@gmail.com" required>
         	</div>

	        	<div class="form-group">
	            	<label for="address">Địa chỉ(Tỉnh):</label>
	            	<input type="text" id="address" name="address" placeholder="Tỉnh thành" required>
							</div>
						<div class="form-group">
								<label for="amount">Số tiền ủng hộ:</label>
								<input type="number" id="amount" name="amount" placeholder="Nhập số tiền ủng hộ" required>
        	</div>

            	<label for="program">Quỹ quyên góp:</label>

                	<option value="1">Ngọn lửa yêu thương - Quỹ hỗ trợ khẩn cấp</option>
                	<option value="2">Bước chân hi vọng - Quỹ hỗ trợ y tế</option>
                	<option value="3">Nhà bình yên - Quỹ hỗ trợ tái thiết nhà ở</option>
                	<option value="4">Hạt giống tương lai - Quỹ hỗ trợ tái thiết nông nghiệp</option>
            	</select>
        	</div>
        	<div class="form-group">
            	<label for="date">Ngày quyên góp:</label>
            	<input type="date" id="date" name="date" required>
            	<input type="submit" value="Cập nhật">
